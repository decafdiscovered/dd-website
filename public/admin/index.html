<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager · Decaf Discovered</title>
    <!-- Netlify Identity widget (needed for the git-gateway backend). -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!--
      The site lives on Azure Static Web Apps but Netlify Identity + Git
      Gateway are provisioned on the .netlify.app mirror. Point the widget
      at that Identity endpoint so login works cross-origin.
    -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.init({
          APIUrl: 'https://decafdiscovered.netlify.app/.netlify/identity',
        });
      }
    </script>

    <!--
      Decap CMS (formerly Netlify CMS). Loaded from CDN so no build-time
      dependency is required. Auth is handled by Netlify Identity + Git
      Gateway — see /admin/config.yml.
    -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
